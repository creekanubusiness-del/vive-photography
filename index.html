<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vive Photography | Explore</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <!-- GLASSMORPHISM NAVBAR -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">Vive</div>
            <a href="#" class="nav-item active">Explore</a>
            <a href="#" class="nav-item" id="create-btn">Create</a>
        </div>
        <div class="nav-right">
            <div class="profile-icon">A</div>
        </div>
    </nav>

    <!-- LIQUID GALLERY WRAPPER -->
    <main class="gallery-wrapper">
        <div class="masonry" id="photo-grid">
            <!-- JavaScript will pour Cloudinary images here -->
        </div>
    </main>

    <script>
        const photoGrid = document.getElementById("photo-grid");

        async function fetchPhotos() {
            try {
                const response = await fetch('/photos'); 
                const photos = await response.json();
                photoGrid.innerHTML = ""; 

                photos.forEach(photo => {
                    const item = document.createElement("div");
                    item.className = "masonry-item";
                    item.innerHTML = `<img src="${photo.url}" alt="Design Pin" loading="lazy">`;
                    photoGrid.appendChild(item);
                });
            } catch (err) {
                console.error("Connection failed:", err);
                photoGrid.innerHTML = "<p>Could not connect to the server.</p>";
            }
        }

        fetchPhotos();
    </script>
</body>
</html>
